<!doctype html>
<html lang="it">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#0a0f1a" media="(prefers-color-scheme: dark)">
  <meta name="theme-color" content="#eef2f8" media="(prefers-color-scheme: light)">
  <title>Accesso · Clima</title>
  <link rel="stylesheet" href="/styles.css">
</head>
<body class="login-page">
  <form class="login-card" id="loginForm">
    <h1>
      <span class="brand-mark">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2v20M3.5 7 20.5 17M20.5 7 3.5 17"/></svg>
      </span>
      Clima
    </h1>
    <label>Password
      <input id="password" type="password" autocomplete="current-password" required>
    </label>
    <button class="btn primary" type="submit">Accedi</button>
    <div class="muted" id="message"></div>
  </form>
  <script>
    document.getElementById('loginForm').addEventListener('submit', async event => {
      event.preventDefault();
      const message = document.getElementById('message');
      message.textContent = 'Accesso in corso...';
      const res = await fetch('/api/login', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({password: document.getElementById('password').value})
      });
      if (res.ok) { location.href = '/'; return; }
      const data = await res.json().catch(() => ({}));
      message.textContent = data.error || 'Accesso non riuscito';
    });
  </script>
</body>
</html>
